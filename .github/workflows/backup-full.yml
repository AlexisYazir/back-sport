name: Backup Full (Manual)

on:
  workflow_dispatch:

jobs:
  backup-full:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add PostgreSQL 17 repository
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y postgresql-client-17

      - name: Create full backup with custom format
        run: |
          # Generar fecha en formato YYYY-MM-DD_HH-MM
          FECHA=$(date +'%Y-%m-%d_%H-%M')
          FILENAME="full_backup_${FECHA}.dump"
          
          /usr/lib/postgresql/17/bin/pg_dump -Fc "${{ secrets.DATABASE_URL_BACKUP }}" > "$FILENAME"
          
          echo "Backup creado: $FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_REGION: auto
        run: |
          aws s3 cp "${{ env.FILENAME }}" s3://${{ secrets.R2_BUCKET }}/full/ --endpoint-url ${{ secrets.R2_ENDPOINT }}

      - name: Cleanup
        run: rm -f *.dump