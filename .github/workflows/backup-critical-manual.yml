name: Backup Critical (Manual)

on:
  workflow_dispatch:

jobs:
  backup-critical:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install PostgreSQL client and AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client awscli

      - name: Create critical tables backup
        run: |
          pg_dump -Fc \
            -t users \
            -t orders \
            -t order_items \
            -t pagos \
            -t inventory \
            -t inventory_movements \
            -t products \
            -t product_variants \
            "${{ secrets.DATABASE_URL_BACKUP }}" > critical_backup_$(date +%Y%m%d_%H%M%S).dump

      - name: Upload to Cloudflare R2 with AWS CLI
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_REGION: auto
        run: |
          aws s3 cp critical_backup_*.dump s3://${{ secrets.R2_BUCKET }}/critical/ --endpoint-url ${{ secrets.R2_ENDPOINT }}

      - name: Cleanup
        run: rm -f *.dump