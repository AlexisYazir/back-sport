name: Backup Critical (Manual)

on:
  workflow_dispatch:

jobs:
  backup-critical:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create critical tables backup
        run: |
          pg_dump -Fc \
            -t users \
            -t orders \
            -t order_items \
            -t pagos \
            -t inventory \
            -t inventory_movements \
            -t products \
            -t product_variants \
            "${{ secrets.DATABASE_URL_BACKUP }}" > critical_backup_$(date +%Y%m%d_%H%M%S).dump

      - name: Upload critical backup to Cloudflare R2
        uses: adityak74/s3-upload-action@main
        with:
          aws_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws_bucket: ${{ secrets.R2_BUCKET }}
          source_dir: '.'
          destination_dir: 'critical'
          endpoint: ${{ secrets.R2_ENDPOINT }}
          region: 'auto'

      - name: Cleanup
        run: rm -f *.dump